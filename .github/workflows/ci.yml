name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # CPU 版 torch（軽量・高速）。失敗時は通常の PyPI にフォールバック。
          pip install torch --index-url https://download.pytorch.org/whl/cpu \
            || pip install torch
          pip install numpy pandas anndata pytest

      - name: Show environment
        run: |
          python --version
          python -c "import numpy, torch, anndata; print('numpy', numpy.__version__, 'torch', torch.__version__, 'anndata', anndata.__version__)"

      - name: Run tests
        run: pytest -q
